name: Build fnOS App (fpk)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-fpk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Prepare fnOS package
        run: |
          PACKAGE_DIR="fnos/App.Native.ElecMeter"
          SERVER_DIR="${PACKAGE_DIR}/app/server"

          rm -rf "${SERVER_DIR}"
          mkdir -p "${SERVER_DIR}"

          # 复制 standalone 构建产物（包括隐藏目录如 .next）
          cp -r .next/standalone/. "${SERVER_DIR}/"

          # 复制 static 资源
          mkdir -p "${SERVER_DIR}/.next/static"
          cp -r .next/static/. "${SERVER_DIR}/.next/static/"

          # 复制 public 资源
          cp -r public "${SERVER_DIR}/public"

          # 创建数据目录
          mkdir -p "${SERVER_DIR}/data"

      - name: Clean unnecessary files (reduce size)
        run: |
          SERVER_DIR="fnos/App.Native.ElecMeter/app/server"

          echo "=== 清理前体积 ==="
          du -sh "${SERVER_DIR}"

          # 1. 处理 .next/node_modules 中的 better-sqlite3 哈希目录
          # fnpack 的 copy_file_range 无法处理该目录，需要先移到 node_modules 再删除
          if [ -d "${SERVER_DIR}/.next/node_modules" ]; then
            for bs3dir in "${SERVER_DIR}/.next/node_modules"/better-sqlite3-*; do
              if [ -d "${bs3dir}" ]; then
                rm -rf "${SERVER_DIR}/node_modules/better-sqlite3" 2>/dev/null || true
                mv "${bs3dir}" "${SERVER_DIR}/node_modules/better-sqlite3"
              fi
            done
            rm -rf "${SERVER_DIR}/.next/node_modules" 2>/dev/null || true
          fi

          # 2. sharp: 删除非当前平台的原生库（runner 是 glibc Ubuntu，不需要 musl）
          rm -rf "${SERVER_DIR}/node_modules/@img/sharp-libvips-linuxmusl-x64" 2>/dev/null || true
          rm -rf "${SERVER_DIR}/node_modules/@img/sharp-linuxmusl-x64" 2>/dev/null || true
          rm -rf "${SERVER_DIR}/node_modules/@img/sharp-win32-x64" 2>/dev/null || true
          rm -rf "${SERVER_DIR}/node_modules/@img/sharp-darwin-x64" 2>/dev/null || true
          rm -rf "${SERVER_DIR}/node_modules/@img/sharp-darwin-arm64" 2>/dev/null || true
          rm -rf "${SERVER_DIR}/node_modules/@img/sharp-libvips-darwin-x64" 2>/dev/null || true
          rm -rf "${SERVER_DIR}/node_modules/@img/sharp-libvips-darwin-arm64" 2>/dev/null || true

          # 2. 删除 Next.js 运行时不需要的大文件
          rm -f "${SERVER_DIR}/node_modules/next/dist/server/capsize-font-metrics.json" 2>/dev/null || true

          # 3. better-sqlite3: 只删除 C/C++ 源码和构建文件，保留运行时必要文件
          for bs3dir in $(find "${SERVER_DIR}" -type d -name "better-sqlite3*" 2>/dev/null); do
            rm -rf "${bs3dir}/deps" 2>/dev/null || true
            rm -rf "${bs3dir}/src" 2>/dev/null || true
            rm -rf "${bs3dir}/build/Release/obj" 2>/dev/null || true
            rm -f "${bs3dir}/binding.gyp" 2>/dev/null || true
          done

          # 4. 删除所有包中的文档、测试、源码、配置文件
          find "${SERVER_DIR}" -type f \( \
            -iname "README*" -o -iname "CHANGELOG*" -o -iname "HISTORY*" \
            -o -iname "LICENSE*" -o -iname "LICENCE*" -o -iname "NOTICE*" \
            -o -iname "*.md" -o -iname "*.gyp" -o -iname "*.gypi" \
            -o -iname ".npmignore" -o -iname ".eslintrc*" -o -iname ".prettierrc*" \
            -o -iname "Makefile" -o -iname "*.ts" -o -iname "*.map" \
            -o -iname "*.c" -o -iname "*.cc" -o -iname "*.cpp" -o -iname "*.h" -o -iname "*.hpp" \
            -o -iname "test.js" -o -iname "test-*.js" -o -iname "*.test.js" \
            -o -iname "*.spec.js" -o -iname "binding.gyp" \
          \) -delete 2>/dev/null || true

          # 5. 删除空目录
          find "${SERVER_DIR}" -type d -empty -delete 2>/dev/null || true

          echo "=== 清理后体积 ==="
          du -sh "${SERVER_DIR}"
          echo "--- 各子目录体积 ---"
          du -sh "${SERVER_DIR}"/*/ "${SERVER_DIR}"/.* 2>/dev/null | sort -rh | head -20
          echo "--- 前 15 大文件 ---"
          find "${SERVER_DIR}" -type f -exec du -h {} + 2>/dev/null | sort -rh | head -15

      - name: Download fnpack & Build fpk
        run: |
          FNPACK_VERSION="1.2.1"
          curl -L -o fnos/fnpack "https://static2.fnnas.com/fnpack/fnpack-${FNPACK_VERSION}-linux-amd64"
          chmod +x fnos/fnpack

          cd fnos/App.Native.ElecMeter
          ../fnpack build

      - name: Upload fpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: App.Native.ElecMeter.fpk
          path: fnos/App.Native.ElecMeter/App.Native.ElecMeter.fpk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fnos/App.Native.ElecMeter/App.Native.ElecMeter.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
