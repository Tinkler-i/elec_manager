name: Build fnOS App (fpk)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-fpk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Prepare fnOS package
        run: |
          PACKAGE_DIR="fnos/App.Native.ElecMeter"
          SERVER_DIR="${PACKAGE_DIR}/app/server"

          rm -rf "${SERVER_DIR}"
          mkdir -p "${SERVER_DIR}"

          # 复制 standalone 构建产物
          cp -r .next/standalone/* "${SERVER_DIR}/"

          # 复制 static 资源
          mkdir -p "${SERVER_DIR}/.next/static"
          cp -r .next/static/* "${SERVER_DIR}/.next/static/"

          # 复制 public 资源
          cp -r public "${SERVER_DIR}/public"

          # 创建数据目录
          mkdir -p "${SERVER_DIR}/data"

      - name: Clean unnecessary files (reduce size)
        run: |
          SERVER_DIR="fnos/App.Native.ElecMeter/app/server"

          echo "=== 清理前体积 ==="
          du -sh "${SERVER_DIR}"

          # 1. better-sqlite3: 只保留编译好的 .node 文件，其余全删
          for bs3dir in $(find "${SERVER_DIR}" -type d -name "better-sqlite3*" 2>/dev/null); do
            # 备份 .node 文件
            find "${bs3dir}" -name "*.node" -exec cp {} /tmp/bs3_node_$(basename ${bs3dir}).node \;
            # 删除整个包目录
            rm -rf "${bs3dir}"
            # 恢复目录结构，只放回 .node
            mkdir -p "${bs3dir}/build/Release"
            mv /tmp/bs3_node_$(basename ${bs3dir}).node "${bs3dir}/build/Release/better_sqlite3.node" 2>/dev/null || true
            # 恢复必须的 JS 文件
            if [ -d ".next/standalone/node_modules/$(basename ${bs3dir})" ]; then
              cp .next/standalone/node_modules/$(basename ${bs3dir})/lib/*.js "${bs3dir}/" 2>/dev/null || true
              cp .next/standalone/node_modules/$(basename ${bs3dir})/package.json "${bs3dir}/" 2>/dev/null || true
              cp .next/standalone/node_modules/$(basename ${bs3dir})/index.js "${bs3dir}/" 2>/dev/null || true
            fi
          done

          # 2. 删除非当前平台的 sharp 原生库
          find "${SERVER_DIR}" -type d -name "sharp-win32*" -exec rm -rf {} + 2>/dev/null || true
          find "${SERVER_DIR}" -type d -name "sharp-darwin*" -exec rm -rf {} + 2>/dev/null || true

          # 3. 删除所有包中的文档、测试、构建配置、源码映射
          find "${SERVER_DIR}" -type f \( \
            -iname "README*" -o -iname "CHANGELOG*" -o -iname "HISTORY*" \
            -o -iname "LICENSE*" -o -iname "LICENCE*" -o -iname "NOTICE*" \
            -o -iname "*.md" -o -iname "*.gyp" -o -iname "*.gypi" \
            -o -iname ".npmignore" -o -iname ".eslintrc*" -o -iname ".prettierrc*" \
            -o -iname "Makefile" -o -iname "*.ts" -o -iname "*.map" \
            -o -iname "*.c" -o -iname "*.cc" -o -iname "*.cpp" -o -iname "*.h" -o -iname "*.hpp" \
            -o -iname "test.js" -o -iname "test-*.js" -o -iname "*.test.js" \
            -o -iname "*.spec.js" -o -iname "binding.gyp" \
          \) -delete 2>/dev/null || true

          # 4. 删除空目录
          find "${SERVER_DIR}" -type d -empty -delete 2>/dev/null || true

          echo "=== 清理后体积 ==="
          du -sh "${SERVER_DIR}"
          echo "--- 各子目录体积 ---"
          du -sh "${SERVER_DIR}"/*/ "${SERVER_DIR}"/.* 2>/dev/null | sort -rh | head -20
          echo "--- 前 15 大文件 ---"
          find "${SERVER_DIR}" -type f -exec du -h {} + 2>/dev/null | sort -rh | head -15

      - name: Download fnpack & Build fpk
        run: |
          FNPACK_VERSION="1.2.1"
          curl -L -o fnos/fnpack "https://static2.fnnas.com/fnpack/fnpack-${FNPACK_VERSION}-linux-amd64"
          chmod +x fnos/fnpack

          cd fnos/App.Native.ElecMeter
          ../fnpack build

      - name: Upload fpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: App.Native.ElecMeter.fpk
          path: fnos/App.Native.ElecMeter/App.Native.ElecMeter.fpk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fnos/App.Native.ElecMeter/App.Native.ElecMeter.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
